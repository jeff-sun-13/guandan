# Pull experiment logs off the Hetzner eval box into the repo every 6 hours (2026-07-01).
# Purpose: while the dev machine is off (human away ~5 days), results become readable from
# ANYWHERE — phone Claude Code sessions, the GitHub UI — without needing the box's SSH key.
# Requires the repo secret BOX_SSH_KEY (the box's /root/.ssh/phone_access private key).
# Safe on a public repo: secrets are encrypted, log-redacted, and not exposed to fork PRs.
# Every step is best-effort: a deleted/unreachable box must NOT fail the workflow.
name: box-sync
on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull logs from the eval box
        env:
          BOX_SSH_KEY: ${{ secrets.BOX_SSH_KEY }}
          BOX: root@178.156.158.230
        run: |
          if [ -z "$BOX_SSH_KEY" ]; then echo "BOX_SSH_KEY not configured — skipping"; exit 0; fi
          mkdir -p ~/.ssh
          printf '%s\n' "$BOX_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -o BatchMode=yes"
          mkdir -p box-results
          status=box-results/box-status.txt
          echo "synced: $(date -u +%F' '%T) UTC" > "$status"
          # one probe decides reachability; also shows what files actually exist on the box
          if ! ssh $SSH_OPTS "$BOX" 'uptime; echo; tmux ls 2>/dev/null; echo; ls -la ~/*.log ~/search-data/ 2>/dev/null; true' >> "$status" 2>&1; then
            echo "box unreachable" >> "$status"
            exit 0
          fi
          # ssh+cat instead of scp: no SFTP dependency, and failures are visible in the status file
          for f in ab-queue.log ab-queue-2.log ab-queue-3.log round1.log round1b.log round1c.log night-queue.log; do
            if ssh $SSH_OPTS "$BOX" "cat ~/$f" > "box-results/$f.tmp" 2>>"$status"; then
              mv "box-results/$f.tmp" "box-results/$f"
              echo "pulled $f ($(wc -c < "box-results/$f") bytes)" >> "$status"
            else
              rm -f "box-results/$f.tmp"
              echo "FAILED to pull $f (see errors above)" >> "$status"
            fi
          done
          # live tmux pane tails: the tee'd logs can lag behind (node buffers stdout to pipes)
          for s in abq abq2 abq3 round1 round1b round1c nightq; do
            ssh $SSH_OPTS "$BOX" "tmux capture-pane -p -t $s 2>/dev/null | tail -20; true" > "box-results/pane-$s.txt" 2>/dev/null || true
          done
          # trained weights, once training on the box has written them
          if ssh $SSH_OPTS "$BOX" 'cat ~/guandan/tools/data/value-weights.json' > /tmp/weights.json 2>/dev/null; then
            mv /tmp/weights.json box-results/value-weights.json
          fi
          if ssh $SSH_OPTS "$BOX" 'cat ~/guandan/tools/data/policy-weights.json' > /tmp/pweights.json 2>/dev/null; then
            mv /tmp/pweights.json box-results/policy-weights.json
          fi
          if ssh $SSH_OPTS "$BOX" 'cat ~/guandan/tools/data/policy-weights-nohist.json' > /tmp/nhweights.json 2>/dev/null; then
            mv /tmp/nhweights.json box-results/policy-weights-nohist.json
          fi
      - name: Commit results if changed
        run: |
          if [ ! -d box-results ]; then
            echo "nothing synced (no BOX_SSH_KEY or box unreachable) — nothing to commit"
            exit 0
          fi
          git config user.name "box-sync"
          git config user.email "actions@users.noreply.github.com"
          git add -f box-results  # -f: the repo .gitignore excludes *.log, which is exactly what we sync
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "box-sync: eval box logs [skip ci]"
            git push
          fi
